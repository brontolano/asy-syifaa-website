<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit File Perpustakaan</title>
  <link rel="icon" type="image/x-icon" href="/AsySyifaa.ico" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="dashboard-page">
  <main class="dashboard">
    <section class="widget-box profile-box">
      <h1>Edit Dokumen Perpustakaan</h1>
      <p id="editInfo" class="note"></p>
      <form id="attrForm" class="library-form">
        <input id="title" type="text" placeholder="Nama file/judul" />
        <input id="category" type="text" placeholder="Kategori" />
        <input id="tags" type="text" placeholder="Tag (pisah koma)" />
        <select id="status">
          <option value="draft">draft</option>
          <option value="publish">publish</option>
        </select>
        <button class="btn primary" type="submit">Simpan Atribut</button>
      </form>
      <hr />
      <form id="replaceForm" class="library-form">
        <label>Replace File PDF</label>
        <input id="pdf" type="file" accept="application/pdf" required />
        <button class="btn ghost" type="submit">Ganti File</button>
      </form>
      <p id="editMsg" class="note"></p>
      <div class="actions">
        <a class="btn ghost" href="/dashboard?module=perpustakaan">Kembali ke CMS Perpustakaan</a>
      </div>
    </section>
  </main>
  <script src="/theme.js"></script>
  <script src="/auth.js"></script>
  <script src="/library-edit.js"></script>
</body>
</html>
