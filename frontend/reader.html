<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reader PDF - Asy-Syifaa ERP</title>
  <link rel="icon" type="image/x-icon" href="/AsySyifaa.ico" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="reader-only-body">
  <main class="reader-only-main">
    <div class="reader-only-shell" id="readerShell">
      <canvas id="readerCanvas" class="reader-canvas" aria-label="Halaman PDF"></canvas>
    </div>
    <section class="reader-mini-player" aria-label="Kontrol Reader">
      <button id="prevPageBtn" class="btn ghost mini-btn" type="button" title="Halaman sebelumnya">◀</button>
      <p id="readerState" class="note reader-state-mini"></p>
      <button id="nextPageBtn" class="btn ghost mini-btn" type="button" title="Halaman berikutnya">▶</button>
      <button id="fitToggleBtn" class="btn ghost mini-btn mini-btn-wide" type="button" title="Auto fit layar" aria-label="Toggle auto fit">⤢</button>
      <a class="btn ghost mini-btn mini-btn-wide mini-back-btn" href="/perpustakaan" title="Kembali">↩</a>
    </section>
  </main>
  <script type="module" src="/reader.js"></script>
</body>
</html>
