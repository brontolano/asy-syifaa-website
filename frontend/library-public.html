<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asy-Syifaa ERP - Perpustakaan Digital</title>
  <link rel="icon" type="image/x-icon" href="/AsySyifaa.ico" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="app-base" data-library-mode="public">
  <main class="dashboard app-main library-app-main">
    <header class="library-appbar">
      <div class="library-appbar-start">
        <img src="/assets/img/logo.png" alt="Logo Asy-Syifaa" class="brand-logo small" />
        <div>
          <p class="library-kicker">ERP Pesantren</p>
          <h1 id="libraryTitle">Perpustakaan Digital</h1>
        </div>
      </div>
      <div class="hero-actions-min">
        <a class="profile-icon-btn" href="/login" aria-label="Login">👤</a>
        <button class="theme-icon-toggle" type="button" data-theme-toggle aria-label="Ganti tema">🌙</button>
      </div>
    </header>

    <section class="library-section library-search-box">
      <form id="filterForm" class="library-form-inline">
        <div class="library-search-input-wrap full-search">
          <input id="q" type="text" placeholder="Cari judul, penulis, kategori, tag..." />
          <button class="search-icon-btn" type="submit" aria-label="Cari">⌕</button>
        </div>
      </form>
      <div class="library-view-switch">
        <select id="filterLanguage" class="library-filter-select" aria-label="Filter bahasa">
          <option value="">Semua Bahasa</option>
          <option value="id">Indonesia</option>
          <option value="ar">Arab</option>
          <option value="en">Inggris</option>
        </select>
        <button id="viewListBtn" class="btn ghost" type="button">List</button>
        <button id="viewGridBtn" class="btn ghost" type="button">Grid</button>
      </div>
    </section>

    <section class="library-section">
      <div class="library-tabs">
        <button id="tabLibraryBtn" class="btn ghost active-toggle" type="button">Koleksi PDF (0)</button>
        <button id="tabBookmarkBtn" class="btn ghost" type="button">Bookmark Saya (0)</button>
      </div>
      <div id="libraryList" class="library-list"></div>
      <p id="bookmarkMsg" class="note"></p>
    </section>
  </main>

  <script src="/theme.js"></script>
  <script src="/auth.js"></script>
  <script type="module" src="/library.js"></script>
</body>
</html>
