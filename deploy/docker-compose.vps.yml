services:
  erp-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: erp-asy-syifaa-app
    restart: unless-stopped
    env_file:
      - .env.vps
    environment:
      - PORT=${APP_PORT}
      # Placeholder future module integration:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      - STORAGE_ENDPOINT=minio
      - STORAGE_PORT=${MINIO_PORT}
    volumes:
      - ../backend/data:/app/backend/data
      - ../backend/storage/library-pdfs:/app/backend/storage/library-pdfs
    depends_on:
      - postgres
      - minio
    networks:
      - internal
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.erp.rule=Host(`${ERP_SUBDOMAIN}.${BASE_DOMAIN}`)
      - traefik.http.routers.erp.entrypoints=websecure
      - traefik.http.routers.erp.tls=true
      - traefik.http.services.erp.loadbalancer.server.port=${APP_PORT}
      - traefik.http.routers.perpustakaan.rule=Host(`${LIB_SUBDOMAIN}.${BASE_DOMAIN}`)
      - traefik.http.routers.perpustakaan.entrypoints=websecure
      - traefik.http.routers.perpustakaan.tls=true
      - traefik.http.services.perpustakaan.loadbalancer.server.port=${APP_PORT}

  postgres:
    image: postgres:16-alpine
    container_name: erp-asy-syifaa-postgres
    restart: unless-stopped
    env_file:
      - .env.vps
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: erp-asy-syifaa-minio
    restart: unless-stopped
    env_file:
      - .env.vps
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal

volumes:
  postgres_data:
  minio_data:

networks:
  internal:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}
