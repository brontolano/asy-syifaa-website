name: Website CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  static-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Validate key files
        run: |
          test -f index.html
          test -f login/index.html
          test -f assets/js/main.js
          test -f daftar-sekarang.html

      - name: Start static server
        run: npx serve . -l 5000 &

      - name: Smoke check endpoints
        run: |
          sleep 3
          curl -f http://localhost:5000/
          curl -f http://localhost:5000/login/
          curl -f http://localhost:5000/daftar-sekarang.html

