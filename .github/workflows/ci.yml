name: Website CI

# Catatan: workflow ini HANYA validasi di runner GitHub (lint + smoke lokal).
# TIDAK melakukan deploy apa pun ke Hostinger / server live.

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Validate key files
        run: |
          test -f index.php
          test -f login/index.html
          test -f assets/js/main.js
          test -f daftar-sekarang.php

      - name: PHP syntax lint (semua *.php)
        run: |
          find . -type f -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0 | xargs -0 -n1 -P4 php -l
