<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ERP Asy-Syifaa</title>
  <link rel="icon" type="image/x-icon" href="/AsySyifaa.ico" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="login-hero-body">
  <main class="landing login-page">
    <section class="widget-box login-box">
      <div class="brand-head">
        <img src="/assets/img/logo.png" alt="Logo Asy-Syifaa" class="brand-logo" />
        <div>
          <p class="brand-kicker">ERP Pesantren</p>
          <p class="brand-sub">Asy-Syifaa Wal Mahmuudiyyah</p>
        </div>
      </div>
      <h1>SILAHKAN LOGIN</h1>
      <form id="loginForm" class="library-form">
        <input id="username" type="text" placeholder="Username" required />
        <input id="password" type="password" placeholder="Password" required />
        <button class="btn primary" type="submit">Masuk</button>
      </form>
      <p id="authMsg" class="note"></p>
      <p class="note">hanya akses terdaftar bisa membuka sistem ini.</p>
    </section>
  </main>

  <script src="/theme.js"></script>
  <script src="/auth.js"></script>
  <script src="/login.js"></script>
</body>
</html>
