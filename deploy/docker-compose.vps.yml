services:
  erp-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: erp-asy-syifaa-app
    restart: unless-stopped
    env_file:
      - .env.vps
    environment:
      - PORT=${APP_PORT}
      # Placeholder future module integration:
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:${MYSQL_PORT}/${MYSQL_DATABASE}
      - STORAGE_ENDPOINT=minio
      - STORAGE_PORT=${MINIO_PORT}
    volumes:
      - ../backend/data:/app/backend/data
      - ../backend/storage/library-pdfs:/app/backend/storage/library-pdfs
    depends_on:
      - mysql
      - minio
    networks:
      - internal
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.erp.rule=Host(`${ERP_SUBDOMAIN}.${BASE_DOMAIN}`)
      - traefik.http.routers.erp.entrypoints=websecure
      - traefik.http.routers.erp.tls=true
      - traefik.http.services.erp.loadbalancer.server.port=${APP_PORT}
      - traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_SUBDOMAIN}.${BASE_DOMAIN}`)
      - traefik.http.routers.dashboard.entrypoints=websecure
      - traefik.http.routers.dashboard.tls=true
      - traefik.http.services.dashboard.loadbalancer.server.port=${APP_PORT}
      - traefik.http.routers.perpustakaan.rule=Host(`${LIB_SUBDOMAIN}.${BASE_DOMAIN}`)
      - traefik.http.routers.perpustakaan.entrypoints=websecure
      - traefik.http.routers.perpustakaan.tls=true
      - traefik.http.services.perpustakaan.loadbalancer.server.port=${APP_PORT}
      - traefik.http.routers.website.rule=Host(`${BASE_DOMAIN}`) || Host(`www.${BASE_DOMAIN}`)
      - traefik.http.routers.website.entrypoints=websecure
      - traefik.http.routers.website.tls=true
      - traefik.http.services.website.loadbalancer.server.port=${APP_PORT}
      - traefik.http.routers.modules.rule=HostRegexp(`{module:[a-z0-9-]+}.${BASE_DOMAIN}`)
      - traefik.http.routers.modules.entrypoints=websecure
      - traefik.http.routers.modules.tls=true
      - traefik.http.routers.modules.priority=1
      - traefik.http.services.modules.loadbalancer.server.port=${APP_PORT}

  mysql:
    image: mariadb:10.11
    container_name: erp-asy-syifaa-mysql
    restart: unless-stopped
    env_file:
      - .env.vps
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: erp-asy-syifaa-minio
    restart: unless-stopped
    env_file:
      - .env.vps
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal

volumes:
  mysql_data:
  minio_data:

networks:
  internal:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}
